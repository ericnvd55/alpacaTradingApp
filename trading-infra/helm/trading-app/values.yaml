replicaCount: 1

image:
  repository: ""
  tag: "latest"
  pullPolicy: IfNotPresent

env:
  GCP_PROJECT_ID: ""
  SPRING_PROFILES_ACTIVE: "gcp-gke,paper"

# Must match the Kubernetes service account name IAM-bound to
# trading-app@<project>.iam.gserviceaccount.com in workload_identity.tf.
serviceAccount:
  name: trading-app

service:
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    memory: 512Mi
