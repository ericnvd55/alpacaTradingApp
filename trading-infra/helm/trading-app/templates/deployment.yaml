apiVersion: apps/v1
kind: Deployment
metadata:
  # Fixed name — trading-infra/terraform/scheduler.tf hardcodes this path
  # for the scale-to-zero Cloud Scheduler jobs.
  name: trading-strategy
  labels:
    app: trading-strategy
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: trading-strategy
  template:
    metadata:
      labels:
        app: trading-strategy
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
        - name: trading-strategy
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
          env:
            - name: GCP_PROJECT_ID
              value: "{{ .Values.env.GCP_PROJECT_ID }}"
            - name: SPRING_PROFILES_ACTIVE
              value: "{{ .Values.env.SPRING_PROFILES_ACTIVE }}"
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
